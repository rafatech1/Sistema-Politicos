name: sistema-politicos

services:
  app:
    container_name: politicos-app
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      # Conecta no postgres-dev da infra compartilhada, via rede dev-network.
      # Usa um banco DEDICADO "politicos" dentro daquele Postgres
      # (criar uma vez — ver passo 4 do README).
      DATABASE_URL: "postgresql://postgres:postgres@postgres-dev:5432/politicos?schema=public"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app                           # código do host  → hot reload
      - /app/node_modules                # preserva node_modules do container
      - next_cache:/app/.next            # cache de build (bem mais rápido no Windows)
      - uploads:/app/public/uploads      # mídia enviada pelo painel admin (LocalStorageAdapter grava aqui)
    networks:
      - dev-network
    restart: unless-stopped

volumes:
  next_cache:
  uploads:

# Rede já criada pela sua infra (C:\Dev\infra\compose)
networks:
  dev-network:
    external: true
